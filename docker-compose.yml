services:
  db:
    image: postgres:latest
    container_name: gastos_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    container_name: gastos_backend_api
    build:
      context: ./Gastos.Backend 
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - DOTNET_RUNNING_IN_CONTAINER=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SERVER_IP=${SERVER_IP}
      - FRONTEND_CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://${SERVER_IP}:5173
    depends_on:
      - db
    volumes:
      - ./Gastos.Backend/config.toml:/app/config.toml

  frontend:
    container_name: gastos_frontend
    build:
      context: ./Gastos.Frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./Gastos.Frontend:/app 
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true 
      - VITE_API_BASE_URL=http://${SERVER_IP}:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:


